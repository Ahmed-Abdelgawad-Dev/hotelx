{% load static %}
<section id="hero" class="relative min-h-screen flex items-center justify-center overflow-hidden" aria-label="Hero section">
  <!-- Canvas background: Particle Network -->
  <canvas id="hero-canvas" class="canvas-bg" aria-hidden="true"></canvas>

  <!-- Background overlay gradients -->
  <div class="absolute inset-0 bg-gradient-to-br from-base-300 via-base-300/90 to-base-300 z-10"></div>
  <div class="absolute inset-0 bg-grid-pattern z-10"></div>

  <!-- Animated gradient orbs -->
  <div class="absolute top-1/4 -left-32 w-96 h-96 bg-primary/10 rounded-full blur-3xl animate-pulse-slow z-0"></div>
  <div class="absolute bottom-1/4 -right-32 w-80 h-80 bg-accent/10 rounded-full blur-3xl animate-pulse-slow animation-delay-2000 z-0"></div>

  <div class="relative z-20 container mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <div class="hero-content max-w-5xl mx-auto">
      <!-- Badge -->
      <div class="mb-6 reveal-fade">
        <span class="inline-block px-5 py-2 text-xs font-semibold tracking-[0.2em] uppercase text-primary bg-primary/10 border border-primary/20 rounded-full glass-panel">
          ★ Premier Luxury Destination
        </span>
      </div>

      <!-- Main heading with Typed.js -->
      <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-bold text-base-content leading-tight mb-6 reveal-fade">
        Where Every Stay
        <br />
        <span class="gradient-text typing-headline"></span>
      </h1>

      <!-- Subheading -->
      <p class="max-w-2xl mx-auto text-base sm:text-lg md:text-xl text-base-content/60 font-light leading-relaxed mb-10 reveal-fade">
        Experience unparalleled comfort and world-class hospitality in the heart of
        <span class="text-primary font-medium">luxury</span>. Your perfect escape awaits.
      </p>

      <!-- CTA buttons -->
      <div class="flex flex-col sm:flex-row items-center justify-center gap-4 reveal-fade">
        <a href="#rooms"
           class="relative btn btn-accent btn-lg text-white text-base font-semibold px-10 border-0 shadow-lg shadow-accent/25 hover:shadow-xl hover:shadow-accent/30 transition-all duration-300 overflow-hidden group">
          <span class="relative z-10 flex items-center">
            Explore Rooms
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
            </svg>
          </span>
        </a>
        <a href="#about"
           class="btn btn-outline btn-lg text-base-content border-base-content/30 hover:bg-base-content/10 hover:border-base-content/50 text-base font-semibold px-8 transition-all duration-300 glass-panel">
          Learn More
        </a>
      </div>

      <!-- Stats row -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8 mt-20 pt-10 border-t border-base-content/10 max-w-3xl mx-auto reveal-fade">
        <div class="text-center">
          <div class="text-3xl md:text-4xl font-bold gradient-text">150+</div>
          <div class="text-xs md:text-sm text-base-content/40 mt-1 tracking-wide uppercase">Luxury Rooms</div>
        </div>
        <div class="text-center">
          <div class="text-3xl md:text-4xl font-bold gradient-text">99%</div>
          <div class="text-xs md:text-sm text-base-content/40 mt-1 tracking-wide uppercase">Guest Satisfaction</div>
        </div>
        <div class="text-center">
          <div class="text-3xl md:text-4xl font-bold gradient-text">12K+</div>
          <div class="text-xs md:text-sm text-base-content/40 mt-1 tracking-wide uppercase">Happy Guests</div>
        </div>
        <div class="text-center">
          <div class="text-3xl md:text-4xl font-bold gradient-text">4.9</div>
          <div class="text-xs md:text-sm text-base-content/40 mt-1 tracking-wide uppercase">Avg. Rating</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 animate-bounce">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-base-content/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
    </svg>
  </div>
</section>
